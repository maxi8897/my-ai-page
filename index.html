<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>商品图生成器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['PingFang SC', 'Microsoft YaHei', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="manifest" href="manifest.json" />
  <style>
    html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
    body { -webkit-tap-highlight-color: transparent; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    .slide-up { animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  </style>
</head>
<body class="bg-[#FAFAF8] text-[#1C1917] font-sans min-h-screen">

  <!-- Navbar -->
  <header id="navbar" class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-[#E7E5E4]">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 sm:h-16 flex items-center justify-between">
      <a href="#" onclick="navigate('create'); return false;" class="flex items-center gap-2 sm:gap-2.5">
        <div class="w-8 h-8 sm:w-9 sm:h-9 rounded-xl bg-gradient-to-br from-orange-400 to-orange-600 flex items-center justify-center shadow-md">
          <svg class="w-4 h-4 sm:w-5 sm:h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
        </div>
        <span class="text-base sm:text-lg font-bold text-[#1C1917]">商品图生成器</span>
      </a>
      <nav class="hidden sm:flex items-center gap-1" id="desktop-nav"></nav>
      <button onclick="toggleMobileMenu()" class="sm:hidden p-2 rounded-lg text-[#78716C] hover:bg-gray-50" id="mobile-menu-btn">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <nav class="sm:hidden border-t border-[#E7E5E4] bg-white/95 backdrop-blur-md hidden" id="mobile-nav"></nav>
  </header>

  <!-- Page: Create -->
  <main id="page-create" class="max-w-4xl mx-auto px-4 sm:px-6 py-6 sm:py-12">
    <div class="text-center mb-6 sm:mb-12">
      <h1 class="text-2xl sm:text-4xl font-bold text-[#1C1917] mb-2 sm:mb-3">一键生成商品图片</h1>
      <p class="text-sm sm:text-lg text-[#78716C]">上传产品图片，AI 智能生成 6 张专业商品图片</p>
    </div>
    <div class="bg-white rounded-2xl p-4 sm:p-8 shadow-sm border border-[#E7E5E4]">
      <!-- Product Name -->
      <div class="mb-5 sm:mb-8">
        <label class="block text-sm font-medium text-[#1C1917] mb-2">产品名称 <span class="text-red-500">*</span></label>
        <input id="product-name" type="text" placeholder="例如：婴儿辅食碗、蓝牙耳机、保温杯..." class="w-full h-11 sm:h-12 px-4 text-base rounded-xl border border-[#E7E5E4] bg-white focus:outline-none focus:ring-2 focus:ring-orange-300 focus:border-orange-400" />
      </div>
      <!-- Image Upload (Base64) -->
      <div class="mb-5 sm:mb-8">
        <label class="block text-sm font-medium text-[#1C1917] mb-2">产品图片 <span class="text-red-500">*</span><span class="text-[#78716C] font-normal ml-2">（最多 5 张）</span></label>
        <div id="drop-zone" onclick="document.getElementById('file-input').click()" class="border-2 border-dashed rounded-xl p-5 sm:p-8 text-center cursor-pointer transition-all duration-200 border-gray-300 hover:border-orange-300 hover:bg-orange-50/50">
          <input id="file-input" type="file" accept="image/*" multiple class="hidden" onchange="handleFileSelect(event)" />
          <svg class="w-8 h-8 sm:w-10 sm:h-10 mx-auto mb-2 sm:mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          <p id="drop-text" class="text-xs sm:text-sm text-[#78716C]">点击上传产品图片</p>
          <p class="text-xs text-gray-400 mt-1">支持 JPG、PNG、WebP 格式</p>
        </div>
        <!-- Preview Grid -->
        <div id="preview-grid" class="grid grid-cols-3 sm:grid-cols-5 gap-2 sm:gap-3 mt-3 sm:mt-4"></div>
      </div>
      <!-- Progress -->
      <div id="progress-section" class="mb-5 sm:mb-8 hidden">
        <div class="flex items-center justify-between mb-2">
          <span id="progress-label" class="text-xs sm:text-sm text-[#78716C]">正在分析产品图片...</span>
          <span id="progress-value" class="text-xs sm:text-sm font-medium text-orange-600">0%</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2"><div id="progress-bar" class="bg-gradient-to-r from-orange-500 to-orange-600 h-2 rounded-full transition-all duration-500" style="width:0%"></div></div>
      </div>
      <!-- Generate Button -->
      <button id="generate-btn" onclick="handleGenerate()" disabled class="w-full h-12 sm:h-14 text-base sm:text-lg font-semibold rounded-xl transition-all duration-200 bg-gray-200 text-gray-400 cursor-not-allowed">
        <span id="generate-btn-text">
          <svg class="w-5 h-5 inline mr-2 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
          生成商品图
        </span>
      </button>
    </div>
  </main>

  <!-- Page: Result -->
  <main id="page-result" class="max-w-3xl mx-auto px-4 sm:px-6 py-4 sm:py-8 hidden"></main>

  <!-- Page: History -->
  <main id="page-history" class="max-w-4xl mx-auto px-4 sm:px-6 py-6 sm:py-12 hidden"></main>

  <!-- Page: Favorites -->
  <main id="page-favorites" class="max-w-4xl mx-auto px-4 sm:px-6 py-6 sm:py-12 hidden"></main>

  <!-- Refine Modal -->
  <div id="refine-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeRefine()"></div>
    <div class="relative w-full sm:max-w-lg bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl max-h-[90vh] sm:max-h-[85vh] flex flex-col slide-up absolute bottom-0 sm:bottom-auto sm:top-1/2 sm:left-1/2 sm:-translate-x-1/2 sm:-translate-y-1/2">
      <div class="flex items-center justify-between p-4 sm:p-5 border-b border-[#E7E5E4]">
        <div>
          <h2 class="text-base sm:text-lg font-semibold text-[#1C1917]">调试图片</h2>
          <p id="refine-subtitle" class="text-xs sm:text-sm text-[#78716C]"></p>
        </div>
        <button onclick="closeRefine()" class="p-2 rounded-lg hover:bg-gray-50"><svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div class="flex-1 overflow-y-auto p-4 sm:p-5 space-y-4">
        <div>
          <label class="block text-sm font-medium text-[#1C1917] mb-2">当前图片</label>
          <div id="refine-current-img" class="rounded-lg overflow-hidden bg-gray-50 border border-[#E7E5E4]"></div>
        </div>
        <div>
          <label class="block text-sm font-medium text-[#1C1917] mb-2">调整描述 <span class="text-red-500">*</span></label>
          <textarea id="refine-text" rows="3" placeholder="描述你想要的调整，例如：背景色改为蓝色、文案改成限时特惠、增加红色促销标签..." class="w-full px-3 py-3 rounded-xl border border-[#E7E5E4] bg-white text-sm resize-none focus:outline-none focus:ring-2 focus:ring-orange-300 focus:border-orange-400 placeholder:text-gray-400"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-[#1C1917] mb-2">参考图片 <span class="text-[#78716C] font-normal">（可选）</span></label>
          <input id="refine-file-input" type="file" accept="image/*" class="hidden" onchange="handleRefineRefUpload(event)" />
          <div id="refine-ref-area">
            <button onclick="document.getElementById('refine-file-input').click()" class="w-full h-20 sm:h-24 rounded-xl border-2 border-dashed border-gray-300 hover:border-orange-300 hover:bg-orange-50/50 active:bg-orange-50 transition-all flex items-center justify-center gap-2 text-[#78716C] text-sm">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
              上传参考图
            </button>
          </div>
          <p class="text-xs text-gray-400 mt-1">上传一张风格参考图，AI 会参考其风格进行调整</p>
        </div>
      </div>
      <div class="p-4 sm:p-5 border-t border-[#E7E5E4] flex items-center gap-3">
        <button onclick="closeRefine()" class="flex-1 h-10 sm:h-auto py-2.5 rounded-xl border border-[#E7E5E4] text-sm font-medium hover:bg-gray-50">取消</button>
        <button id="refine-submit-btn" onclick="handleRefine()" disabled class="flex-1 h-10 sm:h-auto py-2.5 rounded-xl text-sm font-semibold bg-gray-200 text-gray-400 cursor-not-allowed">开始调试</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 z-[60] bg-[#1C1917] text-white px-5 py-2.5 rounded-xl text-sm shadow-lg transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none"></div>

<script>
// ========== State ==========
let currentPage = 'create';
let uploadedFiles = [];
let currentRecord = null;
let refineImageIndex = -1;
let refineRefBase64 = null;
let refineRefPreview = null;
let refineHistories = {};
const MAX_FILES = 5;
const API_BASE = window.location.origin;
const imageLabels = ['首屏图', '卖点总览', '痛点对比', '功能细节', '信任背书', '行动引导'];

// ========== IndexedDB ==========
const DB_NAME = 'productGenDB';
const DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = (event) => {
      const db = event.target.result;
      if (!db.objectStoreNames.contains('history')) {
        db.createObjectStore('history', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('favorites')) {
        db.createObjectStore('favorites', { keyPath: 'id' });
      }
    };
    request.onsuccess = (event) => {
      db = event.target.result;
      resolve(db);
    };
    request.onerror = (event) => reject(event.target.error);
  });
}

function getHistory() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('history', 'readonly');
    const store = tx.objectStore('history');
    const req = store.getAll();
    req.onsuccess = () => {
      const records = req.result || [];
      records.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      resolve(records);
    };
    req.onerror = reject;
  });
}

function addHistoryRecord(record) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('history', 'readwrite');
    const store = tx.objectStore('history');
    store.add(record);
    tx.oncomplete = resolve;
    tx.onerror = reject;
  });
}

function updateHistoryRecord(id, updates) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('history', 'readwrite');
    const store = tx.objectStore('history');
    const getReq = store.get(id);
    getReq.onsuccess = () => {
      const record = getReq.result;
      if (record) {
        Object.assign(record, updates);
        store.put(record);
        tx.oncomplete = resolve;
      } else {
        reject('Record not found');
      }
    };
    getReq.onerror = reject;
  });
}

function deleteHistoryRecord(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('history', 'readwrite');
    const store = tx.objectStore('history');
    store.delete(id);
    tx.oncomplete = resolve;
    tx.onerror = reject;
  });
}

function getFavorites() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('favorites', 'readonly');
    const store = tx.objectStore('favorites');
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = reject;
  });
}

function addFavoriteItem(item) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('favorites', 'readwrite');
    const store = tx.objectStore('favorites');
    store.add(item);
    tx.oncomplete = resolve;
    tx.onerror = reject;
  });
}

function removeFavoriteItem(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('favorites', 'readwrite');
    const store = tx.objectStore('favorites');
    store.delete(id);
    tx.oncomplete = resolve;
    tx.onerror = reject;
  });
}

async function isFavorited(imageBase64) {
  const favs = await getFavorites();
  return favs.some(f => f.imageUrl === imageBase64);
}

// ========== Navigation ==========
const navItems = [
  { page: 'create', label: '创建', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>' },
  { page: 'history', label: '历史', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>' },
  { page: 'favorites', label: '收藏', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>' },
];

function renderNav() {
  const desktopNav = document.getElementById('desktop-nav');
  const mobileNav = document.getElementById('mobile-nav');
  const dHtml = navItems.map(n => `<a href="#" onclick="navigate('${n.page}'); return false;" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 ${currentPage === n.page ? 'bg-orange-50 text-orange-600' : 'text-[#78716C] hover:text-[#1C1917] hover:bg-gray-50'}"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">${n.icon}</svg>${n.label}</a>`).join('');
  const mHtml = navItems.map(n => `<a href="#" onclick="navigate('${n.page}'); closeMobileMenu(); return false;" class="flex items-center gap-3 px-6 py-3.5 text-sm font-medium border-b border-gray-50 last:border-0 transition-colors ${currentPage === n.page ? 'bg-orange-50 text-orange-600' : 'text-[#78716C] hover:text-[#1C1917] hover:bg-gray-50'}"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">${n.icon}</svg>${n.label}</a>`).join('');
  desktopNav.innerHTML = dHtml;
  mobileNav.innerHTML = mHtml;
}

function toggleMobileMenu() {
  document.getElementById('mobile-nav').classList.toggle('hidden');
}
function closeMobileMenu() {
  document.getElementById('mobile-nav').classList.add('hidden');
}

async function navigate(page, data) {
  currentPage = page;
  document.getElementById('page-create').classList.add('hidden');
  document.getElementById('page-result').classList.add('hidden');
  document.getElementById('page-history').classList.add('hidden');
  document.getElementById('page-favorites').classList.add('hidden');

  if (page === 'create') {
    document.getElementById('page-create').classList.remove('hidden');
  } else if (page === 'result') {
    currentRecord = data;
    refineHistories = {};
    await renderResultPage();
    document.getElementById('page-result').classList.remove('hidden');
  } else if (page === 'history') {
    await renderHistoryPage();
    document.getElementById('page-history').classList.remove('hidden');
  } else if (page === 'favorites') {
    await renderFavoritesPage();
    document.getElementById('page-favorites').classList.remove('hidden');
  }
  renderNav();
  window.scrollTo(0, 0);
}

// ========== Toast ==========
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('opacity-0', '-translate-y-4');
  t.classList.add('opacity-100', 'translate-y-0');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.classList.add('opacity-0', '-translate-y-4'); t.classList.remove('opacity-100', 'translate-y-0'); }, 2500);
}

// ========== File Upload (Base64) ==========
function handleFileSelect(event) {
  const files = Array.from(event.target.files).filter(f => f.type.startsWith('image/'));
  const remaining = MAX_FILES - uploadedFiles.length;
  const toAdd = files.slice(0, remaining);
  toAdd.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const base64 = e.target.result;
      uploadedFiles.push({
        dataUrl: base64,
        preview: base64,
        name: file.name
      });
      renderPreviewGrid();
      updateGenerateBtn();
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function removeFile(index) {
  uploadedFiles.splice(index, 1);
  renderPreviewGrid();
  updateGenerateBtn();
}

function renderPreviewGrid() {
  const grid = document.getElementById('preview-grid');
  let html = '';
  uploadedFiles.forEach((f, i) => {
    html += `<div class="relative group aspect-square rounded-lg overflow-hidden bg-gray-100 border border-gray-200">
      <img src="${f.preview}" alt="上传图片 ${i+1}" class="w-full h-full object-cover" />
      <button onclick="event.stopPropagation(); removeFile(${i});" class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 active:opacity-100 sm:active:opacity-0 transition-opacity flex items-center justify-center">
        <svg class="w-5 h-5 sm:w-6 sm:h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>`;
  });
  for (let i = 0; i < MAX_FILES - uploadedFiles.length; i++) {
    html += `<div class="aspect-square rounded-lg border-2 border-dashed border-gray-200 flex items-center justify-center"><svg class="w-4 h-4 sm:w-5 sm:h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg></div>`;
  }
  grid.innerHTML = html;
}

function updateGenerateBtn() {
  const btn = document.getElementById('generate-btn');
  const name = document.getElementById('product-name').value.trim();
  const canGen = name && uploadedFiles.length > 0;
  if (canGen) {
    btn.disabled = false;
    btn.className = 'w-full h-12 sm:h-14 text-base sm:text-lg font-semibold rounded-xl transition-all duration-200 bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white shadow-lg hover:shadow-xl';
  } else {
    btn.disabled = true;
    btn.className = 'w-full h-12 sm:h-14 text-base sm:text-lg font-semibold rounded-xl transition-all duration-200 bg-gray-200 text-gray-400 cursor-not-allowed';
  }
}

// ========== Generate (每次一张图，循环6次) ==========
async function handleGenerate() {
  const productName = document.getElementById('product-name').value.trim();
  if (!productName || uploadedFiles.length === 0) return;

  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.innerHTML = '<svg class="w-5 h-5 inline mr-2 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>生成中...';

  const progressSection = document.getElementById('progress-section');
  progressSection.classList.remove('hidden');
  setProgress(0, '正在生成第 1 张商品图...');

  const recordId = crypto.randomUUID();
  const record = {
    id: recordId,
    productName,
    inputImages: uploadedFiles.map(f => f.dataUrl),
    resultImages: [],
    createdAt: new Date().toISOString(),
    status: 'generating',
  };
  await addHistoryRecord(record);

  try {
    const totalImages = 6;
    for (let i = 0; i < totalImages; i++) {
      setProgress(Math.round(((i) / totalImages) * 100), `正在生成第 ${i + 1} 张商品图...`);

      const res = await fetch(API_BASE + '/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productName, imageIndex: i }),
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || `第 ${i + 1} 张图生成失败`);
      }
      const data = await res.json();
      if (data.imageUrl) {
        record.resultImages.push(data.imageUrl);
        // 实时更新数据库
        await updateHistoryRecord(recordId, { resultImages: [...record.resultImages] });
      } else {
        throw new Error(`第 ${i + 1} 张图返回无效`);
      }
    }

    setProgress(100, '生成完成！');
    await updateHistoryRecord(recordId, { resultImages: record.resultImages, status: 'completed' });
    record.status = 'completed';

    // Reset
    uploadedFiles = [];
    document.getElementById('product-name').value = '';
    renderPreviewGrid();
    updateGenerateBtn();
    progressSection.classList.add('hidden');
    btn.disabled = false;
    btn.innerHTML = '<svg class="w-5 h-5 inline mr-2 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>生成商品图';
    setTimeout(() => { navigate('result', record); }, 500);
  } catch (error) {
    console.error('Generation error:', error);
    await updateHistoryRecord(recordId, { status: 'failed' });
    setProgress(0, '生成失败：' + error.message);
    btn.disabled = false;
    btn.innerHTML = '<svg class="w-5 h-5 inline mr-2 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>生成商品图';
    progressSection.classList.add('hidden');
    updateGenerateBtn();
  }
}

function setProgress(value, label) {
  document.getElementById('progress-bar').style.width = value + '%';
  document.getElementById('progress-value').textContent = Math.round(value) + '%';
  if (label) document.getElementById('progress-label').textContent = label;
}

// ========== Download ==========
function downloadBase64(base64DataUrl, filename) {
  const link = document.createElement('a');
  link.href = base64DataUrl;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function handleDownloadSingle(encodedUrl, index) {
  const base64 = decodeURIComponent(encodedUrl);
  const filename = `${currentRecord?.productName || '商品图'}_${index + 1}.png`;
  downloadBase64(base64, filename);
}

async function handleDownloadAll() {
  if (!currentRecord) return;
  for (let i = 0; i < currentRecord.resultImages.length; i++) {
    const base64 = currentRecord.resultImages[i];
    const filename = `${currentRecord.productName}_${i + 1}.png`;
    downloadBase64(base64, filename);
    await new Promise(r => setTimeout(r, 500));
  }
}

// ========== Favorite ==========
async function toggleFavorite(encodedUrl, index) {
  const imageUrl = decodeURIComponent(encodedUrl);
  const favs = await getFavorites();
  const existing = favs.find(f => f.imageUrl === imageUrl);
  if (existing) {
    await removeFavoriteItem(existing.id);
    showToast('已取消收藏');
  } else {
    const newFav = {
      id: crypto.randomUUID(),
      imageUrl,
      productName: currentRecord?.productName || '',
      savedAt: new Date().toISOString(),
      recordId: currentRecord?.id || '',
    };
    await addFavoriteItem(newFav);
    showToast('已收藏');
  }
  await renderResultPage();
}

  document.getElementById('refine-text').value = '';
  document.getElementById('refine-subtitle').textContent = `第 ${index + 1} 张 · ${imageLabels[index] || '商品图'}`;

  document.getElementById('refine-current-img').innerHTML = `<img src="${currentBase64}" alt="当前图片" class="w-full h-auto max-h-36 sm:max-h-48 object-contain" />`;
  document.getElementById('refine-ref-area').innerHTML = `<button onclick="document.getElementById('refine-file-input').click()" class="w-full h-20 sm:h-24 rounded-xl border-2 border-dashed border-gray-300 hover:border-orange-300 hover:bg-orange-50/50 active:bg-orange-50 transition-all flex items-center justify-center gap-2 text-[#78716C] text-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>上传参考图</button>`;

  refineBtn.className = 'flex-1 h-10 sm:h-auto py-2.5 rounded-xl text-sm font-semibold bg-gray-200 text-gray-400 cursor-not-allowed';
  refineBtn.innerHTML = '<svg class="w-4 h-4 inline mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>开始调试';
  document.getElementById('refine-modal').classList.remove('hidden');
  document.getElementById('refine-text').oninput = function() {
    const hasText = this.value.trim().length > 0;
    const btn = document.getElementById('refine-submit-btn');
    btn.disabled = !hasText;
    btn.className = hasText ? 'flex-1 h-10 sm:h-auto py-2.5 rounded-xl text-sm font-semibold bg-orange-500 hover:bg-orange-600 text-white' : 'flex-1 h-10 sm:h-auto py-2.5 rounded-xl text-sm font-semibold bg-gray-200 text-gray-400 cursor-not-allowed';
  };
}

function closeRefine() {
  document.getElementById('refine-modal').classList.add('hidden');
  refineImageIndex = -1;
}

async function handleRefineRefUpload(event) {
  const file = event.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    refineRefBase64 = e.target.result;
    refineRefPreview = e.target.result;
    document.getElementById('refine-ref-area').innerHTML = `<div class="relative w-20 h-20 sm:w-24 sm:h-24 rounded-lg overflow-hidden border border-[#E7E5E4]"><img src="${refineRefPreview}" alt="参考图" class="w-full h-full object-cover" /></div>`;
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

async function handleRefine() {
  if (refineImageIndex < 0 || !currentRecord) return;
  const currentBase64 = currentRecord.resultImages[refineImageIndex];
  const userPrompt = document.getElementById('refine-text').value.trim();
  if (!currentBase64 || !userPrompt) return;

  const btn = document.getElementById('refine-submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<svg class="w-4 h-4 inline mr-2 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>调试中...';

  try {
    const res = await fetch(API_BASE + '/api/refine', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        imageUrl: currentBase64,
        userPrompt,
        referenceImageUrl: refineRefBase64,
        productName: currentRecord.productName,
      }),
    });
    if (!res.ok) throw new Error('调试失败');
    const data = await res.json();
    if (data.imageUrl) {
      if (!refineHistories[refineImageIndex]) refineHistories[refineImageIndex] = [];
      refineHistories[refineImageIndex].push(currentBase64);
      currentRecord.resultImages[refineImageIndex] = data.imageUrl;
      await updateHistoryRecord(currentRecord.id, { resultImages: currentRecord.resultImages });
      showToast('调试完成');
      closeRefine();
      await renderResultPage();
    }
  } catch (err) {
    console.error('Refine error:', err);
    showToast('调试失败，请重试');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg class="w-4 h-4 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>开始调试';
  }
}

async function handleRevertRefine(index) {
  if (!currentRecord) return;
  const hist = refineHistories[index];
  if (!hist || hist.length === 0) return;
  const previousBase64 = hist.pop();
  currentRecord.resultImages[index] = previousBase64;
  await updateHistoryRecord(currentRecord.id, { resultImages: currentRecord.resultImages });
  showToast('已回退到上一版本');
  await renderResultPage();
}

async function loadResult(recordId) {
  const records = await getHistory();
  const found = records.find(r => r.id === recordId);
  if (found && found.status === 'completed') {
    currentRecord = found;
    refineHistories = {};
    await navigate('result', found);
  }
}

    html += `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3 sm:gap-4">`;
    favorites.forEach(item => {
      html += `<div class="bg-white rounded-2xl overflow-hidden border border-[#E7E5E4] shadow-sm hover:shadow-md transition-all group">
        <div class="relative aspect-[9/16] bg-gray-100">
          <img src="${item.imageUrl}" alt="${item.productName}" class="w-full h-full object-cover" loading="lazy" />
          <div class="absolute inset-0 bg-black/0 group-hover:bg-black/40 active:bg-black/40 sm:active:bg-black/0 transition-all duration-200 flex items-center justify-center gap-2 opacity-0 group-hover:opacity-100 active:opacity-100 sm:active:opacity-0">
            <button onclick="downloadBase64('${item.imageUrl}', '${item.productName || '商品图'}.png')" class="rounded-full bg-white/90 hover:bg-white text-gray-800 h-9 w-9 sm:h-10 sm:w-10 flex items-center justify-center">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            </button>
            <button onclick="removeFavoriteItem('${item.id}'); renderFavoritesPage(); showToast('已取消收藏');" class="rounded-full bg-white/90 hover:bg-white text-red-500 h-9 w-9 sm:h-10 sm:w-10 flex items-center justify-center">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </div>
        </div>
        <div class="p-2.5 sm:p-3">
          <p class="text-xs sm:text-sm font-medium text-[#1C1917] truncate">${item.productName}</p>
          <p class="text-[10px] sm:text-xs text-[#78716C] mt-0.5">${new Date(item.savedAt).toLocaleDateString('zh-CN')}</p>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  container.innerHTML = html;
}

// ========== Init ==========
document.getElementById('product-name').addEventListener('input', updateGenerateBtn);
openDB().then(() => {
  renderNav();
});

// Drag & drop
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('border-orange-400', 'bg-orange-50'); dropZone.classList.remove('border-gray-300'); });
dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('border-orange-400', 'bg-orange-50'); dropZone.classList.add('border-gray-300'); });
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('border-orange-400', 'bg-orange-50');
  dropZone.classList.add('border-gray-300');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  const remaining = MAX_FILES - uploadedFiles.length;
  const toAdd = files.slice(0, remaining);
  toAdd.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      uploadedFiles.push({
        dataUrl: e.target.result,
        preview: e.target.result,
        name: file.name
      });
      renderPreviewGrid();
      updateGenerateBtn();
    };
    reader.readAsDataURL(file);
  });
});

// PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}
</script>
</body>
